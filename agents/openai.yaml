interface:
  display_name: "Code Guide"
  short_description: "Architecture, quality, and bilingual workflow guidance for code changes"
  default_prompt: "Use $codeguide in outcome-first mode: choose the smallest workflow that can produce a correct, grounded, and verifiable result. Run scripts/run_codeguide.sh and keep project docs synchronized only for material architecture, multi-file, cross-service, delegated, or durable planning work. For shadow effect work, route LLM drafts through scripts/shadow_llm_candidate_wrapper.py, guarded user decisions through scripts/shadow_user_decision_wrapper.py, unresolved probes through scripts/shadow_review_queue.py, final apply checks through scripts/shadow_apply_gate.py, and structured writes through scripts/shadow_effect_writer.py; never treat LLM consensus, memory, vectorstore, graph, or Serena hints as evidence. Act as the supervising lead architect when coordination is needed: run main-thread risk preflight before spawning sub-agents, invoking external reviewers, or starting ping-pong; if approval is required, stop before delegation/external review until the user approves the exact next step. Maintain orchestration/ORCH-<task-id>.md for delegated or externally reviewed tasks, including risk_preflight_status and approval_ref. Treat sub-agent aliases such as 서브에이전트, 서브 에이전트, subagent, subagents, sub-agent, and sub-agents as the same trigger. Only when the user explicitly uses one of those sub-agent trigger forms for code writing, implementation, or ping-pong review requests should you default to delegation-first execution with planner/reviewer/implementation/validation tracks while the main thread supervises and integrates unless direct implementation is the fastest correct path. Translate planning/execution reasoning to English internally, and report to the user in Korean unless requested otherwise."
