interface:
  display_name: "Code Guide"
  short_description: "Architecture, quality, and bilingual workflow guidance for code changes"
  default_prompt: "Use $codeguide in zero-command mode: run scripts/run_codeguide.sh at start and finish, keep workspace docs under docs/ synchronized, act as the supervising lead architect in a multi-agent workflow, maintain orchestration/ORCH-<task-id>.md for active tasks, delegate planning/review/coding to sub-agents by default, translate planning/execution reasoning to English internally, and report to the user in Korean unless requested otherwise."
